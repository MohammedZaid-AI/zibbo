name: zibbo

services:
  gateway:
    build:
      context: .
      target: runtime
    ports:
      - "${ZIBBO_PORT:-8000}:8000"
    environment:
      ZIBBO_ENVIRONMENT: development
      ZIBBO_DEBUG: "true"
      ZIBBO_LOG_LEVEL: INFO
      ZIBBO_LOG_FORMAT: console
      ZIBBO_CORS_ALLOW_ORIGINS: http://localhost:3000
      ZIBBO_OPENAI_BASE_URL: ${ZIBBO_OPENAI_BASE_URL:-https://api.openai.com/v1}
      # Optional fallback keys. Callers that send their own credential override them.
      ZIBBO_OPENAI_API_KEY: ${ZIBBO_OPENAI_API_KEY:-}
      ZIBBO_ANTHROPIC_API_KEY: ${ZIBBO_ANTHROPIC_API_KEY:-}
      # OpenAI-compatible providers activate when their base URL is set.
      ZIBBO_GROQ_BASE_URL: ${ZIBBO_GROQ_BASE_URL:-}
      ZIBBO_GROQ_API_KEY: ${ZIBBO_GROQ_API_KEY:-}
      ZIBBO_OLLAMA_BASE_URL: ${ZIBBO_OLLAMA_BASE_URL:-}
      # Consumed from Phase 4 (Postgres) and Phase 8 (Redis) onward.
      ZIBBO_DATABASE_URL: postgresql://zibbo:zibbo@postgres:5432/zibbo
      ZIBBO_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zibbo
      POSTGRES_PASSWORD: zibbo
      POSTGRES_DB: zibbo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zibbo -d zibbo"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
