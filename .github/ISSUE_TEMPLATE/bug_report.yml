name: Bug report
description: Something Zibbo did wrong — a crash, wrong output, or a broken command.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please do not include the contents of real prompts or any
        secrets — Zibbo is content-blind by design, and this issue tracker is public.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you do, and what went wrong?
      placeholder: I ran `zibbo start` and ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands or requests. Redact any secrets.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Zibbo version
      description: Output of `zibbo version`.
      placeholder: zibbo 0.1.0 (internal API v1)
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: OS and Python version
      placeholder: Windows 11 / Python 3.12
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: CLI output or gateway logs (metadata only — never request contents).
      render: shell
